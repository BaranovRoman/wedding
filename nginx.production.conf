# HTTP редирект на HTTPS
server {
	listen 91.240.85.53:80;
	listen [::]:80;
	server_name wedding.baranov-digital.ru www.wedding.baranov-digital.ru;

	return 301 https://$server_name$request_uri;
}

server {
	server_name wedding.baranov-digital.ru www.wedding.baranov-digital.ru;
	ssl_certificate "/var/www/httpd-cert/www-root/wedding.baranov-digital.ru_le1.crtca";
	ssl_certificate_key "/var/www/httpd-cert/www-root/wedding.baranov-digital.ru_le1.key";
	ssl_ciphers EECDH:+AES256:-3DES:RSA+AES:!NULL:!RC4;
	ssl_prefer_server_ciphers on;
	ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
	ssl_dhparam /etc/ssl/certs/dhparam4096.pem;
	charset off;
	index index.html;
	disable_symlinks if_not_owner from=$root_path;
	include /etc/nginx/vhosts-includes/*.conf;
	include /etc/nginx/vhosts-resources/wedding.baranov-digital.ru/*.conf;
	include /etc/nginx/users-resources/www-root/*.conf;
	access_log /var/www/httpd-logs/wedding.baranov-digital.ru.access.log;
	error_log /var/www/httpd-logs/wedding.baranov-digital.ru.error.log notice;
	ssi on;
	set $root_path /var/www/www-root/data/www/wedding.baranov-digital.ru;
	root $root_path;
	listen 91.240.85.53:443 ssl;
	listen [::]:443 ssl;
	gzip on;
	gzip_comp_level 5;
	gzip_disable "msie6";
	gzip_types text/plain text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript application/javascript image/svg+xml;

	# Статические файлы Next.js - проксируем через Next.js сервер
	location /_next {
		proxy_pass http://localhost:5010;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		expires 1y;
		add_header Cache-Control "public, immutable";
	}

	# Статические файлы из Next.js public (images, fonts и т.д.)
	location ~ ^/(images|fonts|icons|favicon\.ico|robots\.txt|sitemap\.xml) {
		proxy_pass http://localhost:5010;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		expires 30d;
		add_header Cache-Control "public, immutable";
	}

	location / {
		proxy_pass http://localhost:5010;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection 'upgrade';
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_cache_bypass $http_upgrade;
	}
}
